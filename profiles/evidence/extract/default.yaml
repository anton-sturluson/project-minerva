name: default
source_kinds:
  sec-10k:
    questions:
      - id: business-overview
        question: Summarize the business model, operating segments, and primary revenue drivers.
      - id: financial-highlights
        question: >-
          Extract the key financial metrics as a markdown table with columns:
          Metric, Current Period, Prior Period, YoY Change. Include revenue,
          operating income, net income, EPS, and any segment-level breakdowns.
      - id: growth-drivers
        question: >-
          What is actually driving growth or decline? Identify the specific
          products, segments, geographies, or initiatives management credits
          for changes in revenue and profitability. Include numbers.
      - id: competition
        question: Summarize the competitive positioning, moats, and management's framing of competition.
      - id: management
        question: Summarize management priorities, strategic initiatives, and capital allocation signals.
      - id: risks
        question: Summarize the most important business and operating risks.
  sec-10q:
    questions:
      - id: recent-update
        question: Summarize the most important quarter-to-date operating changes and management commentary.
      - id: financial-update
        question: >-
          Extract the key quarter financial metrics as a markdown table:
          Metric, Current Quarter, Prior Year Quarter, YoY Change. Include
          revenue, operating income, net income, and EPS.
      - id: risks
        question: Summarize the most important new or changed risks mentioned in the filing.
  sec-8k-earnings:
    questions:
      - id: earnings-takeaways
        question: Summarize the most important earnings takeaways, KPIs, and guidance changes.
      - id: kpi-summary
        question: >-
          Extract the key reported KPIs as a markdown table: KPI, Value,
          Prior Period Value, Change. Include user/customer metrics,
          engagement metrics, and unit economics.
      - id: guidance
        question: >-
          Extract any forward guidance, targets, or outlook statements.
          Quote management directly where possible. If no guidance was
          provided, state that explicitly.
      - id: management
        question: Summarize management's near-term priorities and tone from the earnings material.
  sec-financials-income:
    questions:
      - id: income-statement
        question: Summarize the key income statement trends and material year-over-year changes.
  sec-financials-balance:
    questions:
      - id: balance-sheet
        question: Summarize the key balance sheet strengths, constraints, and liquidity signals.
  sec-financials-cash:
    questions:
      - id: cash-flow
        question: Summarize the key cash flow trends and capital intensity signals.
  external-research:
    questions:
      - id: external-evidence
        question: Summarize the most important third-party evidence and how it changes the business view.
